<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brava Staff Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f2ee; color: #1a1a1a; font-size: 15px; }
  .header { background: #4d6dff; padding: 20px 16px 0; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo { color: #fff; font-weight: 600; font-size: 16px; }
  .search { width: 100%; padding: 11px 16px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: #fff; font-size: 15px; outline: none; margin-bottom: 16px; }
  .search::placeholder { color: rgba(255,255,255,0.6); }
  .tabs { display: flex; }
  .tab { flex: 1; padding: 10px 0; border: none; cursor: pointer; font-size: 14px; font-weight: 500; background: transparent; color: rgba(255,255,255,0.7); }
  .tab.active { background: #f4f2ee; color: #4d6dff; border-radius: 10px 10px 0 0; }
  .content { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
  .stats { display: flex; gap: 10px; margin-bottom: 20px; }
  .stat { flex: 1; background: #fff; border: 1px solid #e5e3df; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-n { font-size: 22px; font-weight: 600; color: #4d6dff; }
  .stat-l { font-size: 12px; color: #888; }
  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter { padding: 6px 14px; border-radius: 20px; font-size: 13px; border: 1px solid #e5e3df; background: #fff; color: #555; cursor: pointer; }
  .series-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .series-badge { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; }
  .series-group { margin-bottom: 24px; }
  .card { background: #fff; border: 1px solid #e5e3df; border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 6px; cursor: pointer; }
  .card.dimmed { opacity: 0.45; cursor: default; }
  .card-icon { font-size: 20px; flex-shrink: 0; }
  .card-body { flex: 1; min-width: 0; }
  .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .card-code { font-weight: 500; font-size: 12px; }
  .card-status { font-size: 10px; padding: 2px 7px; border-radius: 4px; }
  .card-title { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .faq-item { background: #fff; border: 1px solid #e5e3df; border-radius: 10px; margin-bottom: 6px; overflow: hidden; }
  .faq-item.urgent { border-color: #f0c8c8; }
  .faq-btn { width: 100%; background: none; border: none; padding: 13px 16px; display: flex; align-items: center; gap: 10px; text-align: left; cursor: pointer; }
  .faq-btn.urgent { background: #fff9f8; }
  .faq-answer { padding: 10px 16px 14px 48px; border-top: 1px solid #f0eeea; font-size: 14px; line-height: 1.6; color: #333; display: none; }
  .val-item { background: #fff; border: 1px solid #e5e3df; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .val-btn { width: 100%; background: none; border: none; padding: 14px 16px; display: flex; align-items: center; gap: 12px; text-align: left; cursor: pointer; }
  .val-body { padding: 0 16px 14px 52px; border-top: 1px solid #f0eeea; display: none; }
  .page-header { background: #4d6dff; padding: 16px 16px 20px; }
  .back { color: rgba(255,255,255,0.8); font-size: 14px; display: block; margin-bottom: 12px; cursor: pointer; }
  .page-title { color: #fff; font-size: 19px; font-weight: 600; line-height: 1.3; }
  .section-body { background: #fff; border: 1px solid #e5e3df; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
  .block-p { font-size: 14px; color: #333; line-height: 1.7; margin-bottom: 8px; }
  .block-bullet { padding: 7px 12px; border-radius: 6px; font-size: 14px; line-height: 1.5; margin-bottom: 3px; }
  .block-callout { border-radius: 0 6px 6px 0; padding: 10px 14px; margin-bottom: 8px; font-size: 14px; }
  .block-h { font-size: 14px; font-weight: 600; margin: 12px 0 6px; color: #444; }
  .notion-link { font-size: 13px; color: #bbb; text-decoration: underline; display: block; text-align: center; margin-top: 16px; }
  .loading { text-align: center; padding: 60px 0; color: #888; }
  .empty { text-align: center; padding: 40px 0; color: #888; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const PROXY = 'https://brava-notion-proxy.manu-caldas.workers.dev'
const DB = {
  sops:    '6d7b2b96-566f-4c9c-aabb-329789feae5c',
  faqs:    'fdf80135-d1e9-4c07-b329-ccc049a45a50',
  culture: '02b15e9b-e4c1-4d28-8177-f4b18c84d700',
}
const SERIES = {
  Treatments:       { key:'T', color:'#185fa5', bg:'#e6f1fb', owner:'Alicia' },
  Hygiene:          { key:'H', color:'#854f0b', bg:'#faeeda', owner:'Alicia' },
  'Studio Ops':     { key:'S', color:'#534ab7', bg:'#eeedfe', owner:'Manu' },
  'Client Journey': { key:'C', color:'#0f6e56', bg:'#e1f5ee', owner:'Manu' },
}
const ORDER  = ['T','H','S','C']
const LABELS = { T:'Treatments', H:'Hygiene', S:'Studio Ops', C:'Client Journey' }

let S = { tab:'sops', search:'', series:'ALL', sops:[], faqs:[], culture:[], loading:true, page:null, pageBlocks:null }

async function api(path, body) {
  const r = await fetch(PROXY + '/' + path, {
    method: body ? 'POST' : 'GET',
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  })
  return r.json()
}

function rt(arr) { return (arr||[]).map(r=>r.plain_text||'').join('') }
function gp(props, name) {
  const p = props[name]; if(!p) return ''
  if(p.type==='title') return rt(p.title)
  if(p.type==='rich_text') return rt(p.rich_text)
  if(p.type==='select') return p.select?.name||''
  return ''
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

async function loadAll() {
  try {
    const [sr, fr, cr] = await Promise.all([
      api(`databases/${DB.sops}/query`,    { sorts:[{property:'Series',direction:'ascending'},{property:'Sort Order',direction:'ascending'}] }),
      api(`databases/${DB.faqs}/query`,    { sorts:[{property:'Sort Order',direction:'ascending'}] }),
      api(`databases/${DB.culture}/query`, { sorts:[{property:'Sort Order',direction:'ascending'}] }),
    ])
    S.sops = (sr.results||[]).map(p => {
      const series = gp(p.properties,'Series'), name = gp(p.properties,'Name')
      return { id:p.id, code:gp(p.properties,'Code'), title:name.replace(/^SOP-[A-Z]+\d+[a-z]?\s*[—\-–]\s*/i,'').trim(), series, seriesKey:(SERIES[series]||{}).key||'S', status:gp(p.properties,'Status'), icon:p.icon?.emoji||'📋', url:p.url }
    })
    S.faqs = (fr.results||[]).map(p => ({ id:p.id, question:gp(p.properties,'Question'), category:gp(p.properties,'Category'), urgency:gp(p.properties,'Urgency'), icon:p.icon?.emoji||'❓', url:p.url }))
    S.culture = (cr.results||[]).map(p => ({ id:p.id, title:gp(p.properties,'Title'), type:gp(p.properties,'Type'), icon:p.icon?.emoji||'🧭', url:p.url }))
  } catch(e) { console.error('Load error:', e) }
  S.loading = false; render()
}

async function loadPageBlocks(id) {
  try {
    const r = await api(`blocks/${id}/children?page_size=100`)
    S.pageBlocks = r.results||[]
  } catch(e) { S.pageBlocks = [] }
  render()
}

function renderBlocks(blocks) {
  return (blocks||[]).map(b => {
    const t = rt((b[b.type]||{}).rich_text||[])
    if(b.type==='paragraph' && t.trim()) return `<p class="block-p">${esc(t)}</p>`
    if(b.type==='bulleted_list_item'||b.type==='numbered_list_item') {
      const w = t.includes('⚠️')||t.includes('⛔')
      return `<div class="block-bullet" style="background:${w?'#fff9f8':'#fafaf8'};border-left:3px solid ${w?'#da5346':'transparent'}">${esc(t)}</div>`
    }
    if(b.type==='callout') {
      const em=b.callout?.icon?.emoji||'💡', w=['⚠️','⛔','🚫'].includes(em)
      return `<div class="block-callout" style="background:${w?'#fff9f8':'#f4f2ee'};border-left:3px solid ${w?'#da5346':'#4d6dff'}">${em} ${esc(t)}</div>`
    }
    if(b.type==='heading_2'||b.type==='heading_3') return `<div class="block-h">${esc(t)}</div>`
    if(b.type==='divider') return `<hr style="border:none;border-top:1px solid #e5e3df;margin:10px 0">`
    return ''
  }).join('')
}

function render() {
  document.getElementById('app').innerHTML = S.page ? renderPage() : renderHome()
}

function renderHome() {
  return `<div style="max-width:720px;margin:0 auto">
    <div class="header">
      <div class="header-top"><span class="logo">★ Brava Staff Hub</span><span style="color:rgba(255,255,255,0.6);font-size:12px">Brava Nails Berlin</span></div>
      <input class="search" id="search" type="text" placeholder="Search..." value="${esc(S.search)}" oninput="S.search=this.value;render()">
      <div class="tabs">
        <button class="tab${S.tab==='sops'?' active':''}" onclick="S.tab='sops';S.search='';render()">SOPs</button>
        <button class="tab${S.tab==='faqs'?' active':''}" onclick="S.tab='faqs';S.search='';render()">FAQs</button>
        <button class="tab${S.tab==='culture'?' active':''}" onclick="S.tab='culture';S.search='';render()">Culture</button>
      </div>
    </div>
    <div class="content">
      ${S.loading ? '<div class="loading">Loading...</div>' : S.tab==='sops' ? renderSops() : S.tab==='faqs' ? renderFaqs() : renderCulture()}
    </div>
  </div>`
}

function renderSops() {
  const live = S.sops.filter(s=>s.status==='Live').length
  const q = S.search.toLowerCase()
  const filtered = S.sops.filter(s => (S.series==='ALL'||s.seriesKey===S.series) && (!q||s.title.toLowerCase().includes(q)||s.code.toLowerCase().includes(q)))
  const grouped = {}
  ORDER.forEach(k => { const items=filtered.filter(s=>s.seriesKey===k); if(items.length) grouped[k]=items })
  return `
    <div class="stats">
      <div class="stat"><div class="stat-n">${live}</div><div class="stat-l">Live</div></div>
      <div class="stat"><div class="stat-n">${S.sops.length}</div><div class="stat-l">Total</div></div>
      <div class="stat"><div class="stat-n">4</div><div class="stat-l">Series</div></div>
    </div>
    <div class="filters">
      ${['ALL',...ORDER].map(s => {
        const active=S.series===s, cfg=SERIES[LABELS[s]]
        return `<button class="filter" style="${active&&cfg?`background:${cfg.bg};color:${cfg.color};border:none;font-weight:500`:active?'background:#4d6dff;color:#fff;border:none;font-weight:500':''}" onclick="S.series='${s}';render()">${s==='ALL'?'All':LABELS[s]}</button>`
      }).join('')}
    </div>
    ${ORDER.filter(k=>grouped[k]).map(k => {
      const cfg=SERIES[LABELS[k]]
      return `<div class="series-group">
        <div class="series-header">
          <div class="series-badge" style="background:${cfg.bg};color:${cfg.color}">${k}</div>
          <span style="font-weight:600;font-size:15px">${LABELS[k]}</span>
          <span style="font-size:12px;color:#999;margin-left:auto">Owner: ${cfg.owner}</span>
        </div>
        ${grouped[k].map(sop => {
          const live=sop.status==='Live'
          return `<div class="card${live?'':' dimmed'}" ${live?`onclick="goPage('${sop.id}','sop','${esc(sop.title)}','${sop.icon}','${esc(sop.url)}')"`:''}> 
            <span class="card-icon">${sop.icon}</span>
            <div class="card-body">
              <div class="card-meta">
                <span class="card-code" style="color:${cfg.color}">${sop.code}</span>
                <span class="card-status" style="background:${live?'#e1f5ee':'#f0eeea'};color:${live?'#0f6e56':'#999'}">${sop.status}</span>
              </div>
              <div class="card-title">${esc(sop.title)}</div>
            </div>
            ${live?'<span style="color:#bbb;font-size:18px">›</span>':''}
          </div>`
        }).join('')}
      </div>`
    }).join('')}
    ${Object.keys(grouped).length===0?'<div class="empty">No SOPs found.</div>':''}`
}

function renderFaqs() {
  const q = S.search.toLowerCase()
  const filtered = S.faqs.filter(f=>!q||f.question.toLowerCase().includes(q))
  if(!filtered.length) return '<div class="empty">No FAQs found.</div>'
  return `<p style="font-size:13px;color:#888;margin-bottom:16px">Quick answers. Tap to expand.</p>
    ${filtered.map((f,i) => `
    <div class="faq-item${f.urgency==='Urgent'?' urgent':''}">
      <button class="faq-btn${f.urgency==='Urgent'?' urgent':''}" onclick="toggleItem('fa${i}','ft${i}')">
        <span style="font-size:18px;flex-shrink:0">${f.icon}</span>
        <div style="flex:1">
          <div style="font-weight:500;font-size:14px">${esc(f.question)}</div>
          <div style="display:flex;gap:6px;margin-top:4px">
            ${f.category?`<span class="tag" style="background:#e6f1fb;color:#185fa5">${f.category}</span>`:''}
            ${f.urgency==='Urgent'?'<span class="tag" style="background:#fff0ee;color:#da5346">⚠️ Urgent</span>':''}
          </div>
        </div>
        <span id="ft${i}" style="color:#4d6dff;font-size:20px;font-weight:300">+</span>
      </button>
      <div class="faq-answer" id="fa${i}">
        <a onclick="goPage('${f.id}','faq','${esc(f.question)}','${f.icon}','${esc(f.url)}')" style="color:#4d6dff;cursor:pointer;font-size:13px">Read full answer →</a>
      </div>
    </div>`).join('')}`
}

function renderCulture() {
  if(!S.culture.length) return '<div class="empty">No culture entries found.</div>'
  return `<p style="font-size:13px;color:#888;margin-bottom:16px">Who we are and how we show up every day.</p>
    ${S.culture.map((v,i) => `
    <div class="val-item">
      <button class="val-btn" onclick="toggleItem('va${i}','vt${i}')">
        <span style="font-size:24px">${v.icon}</span>
        <div style="flex:1">
          <div style="font-weight:600;font-size:15px">${esc(v.title)}</div>
          ${v.type?`<span class="tag" style="background:#eeedfe;color:#534ab7;margin-top:4px;display:inline-block">${v.type}</span>`:''}
        </div>
        <span id="vt${i}" style="color:#4d6dff;font-size:20px;font-weight:300">+</span>
      </button>
      <div class="val-body" id="va${i}">
        <a onclick="goPage('${v.id}','culture','${esc(v.title)}','${v.icon}','${esc(v.url)}')" style="color:#4d6dff;cursor:pointer;font-size:13px;display:block;padding-top:10px">Read in full →</a>
      </div>
    </div>`).join('')}`
}

function renderPage() {
  const p = S.page
  const accent = p.type==='culture' ? '#534ab7' : '#4d6dff'
  return `<div style="max-width:720px;margin:0 auto">
    <div class="page-header" style="background:${accent}">
      <span class="back" onclick="S.page=null;S.pageBlocks=null;render()">← Back</span>
      <div style="display:flex;align-items:flex-start;gap:12px">
        <span style="font-size:28px">${p.icon}</span>
        <div class="page-title">${esc(p.title)}</div>
      </div>
    </div>
    <div style="padding:20px 16px 60px">
      ${!S.pageBlocks ? '<div class="loading">Loading content...</div>' : `
        <div class="section-body">${renderBlocks(S.pageBlocks)}</div>
        <a class="notion-link" href="${p.url}" target="_blank">View & edit in Notion ↗</a>
      `}
    </div>
  </div>`
}

function toggleItem(bodyId, togId) {
  const body=document.getElementById(bodyId), tog=document.getElementById(togId)
  if(!body||!tog) return
  const open = body.style.display==='block'
  body.style.display = open?'none':'block'
  tog.textContent = open?'+':'−'
}

function goPage(id, type, title, icon, url) {
  S.page = { id, type, title, icon, url }
  S.pageBlocks = null
  render()
  loadPageBlocks(id)
}

render()
loadAll()
</script>
</body>
</html>
